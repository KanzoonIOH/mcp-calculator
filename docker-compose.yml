services:
    mcp-calculator:
        build: .
        ports:
            - "8000:8000"
        environment:
            FASTMCP_TRANSPORT: streamable-http
            FASTMCP_HOST: 0.0.0.0
            FASTMCP_PORT: 8000
        restart: unless-stopped
        networks:
            - shared-net
networks:
    shared-net:
        external: true
